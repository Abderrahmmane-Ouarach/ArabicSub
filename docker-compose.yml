services:
  app:
    build: .
    restart: unless-stopped
    networks:
      - subtitles-net
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./jobs:/app/jobs
    environment:
      - PYTHONUNBUFFERED=1

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - subtitles-net
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./htpasswd:/etc/nginx/.htpasswd
    depends_on:
      - app

networks:
  subtitles-net:
    driver: bridge